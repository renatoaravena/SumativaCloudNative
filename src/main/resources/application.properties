spring.application.name=SumativaCloudNative
server.port=8080

#Azure
spring.security.oauth2.resourceserver.jwt.issuer-uri= https://login.microsoftonline.com/551e9396-e26d-4bf2-ba5b-baa0506d0cd9/v2.0

# Configuracion para logs de AWS
logging.level.software.amazon.awssdk=DEBUG
logging.level.io.awspring.cloud=DEBUG

# Configuracion EFS
efs.path=/app/efs
aws.s3.bucket=${S3_BUCKET_NAME}

#Rabbit MQ
spring.rabbitmq.host=rabbitmq1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


